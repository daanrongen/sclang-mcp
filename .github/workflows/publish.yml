name: Publish

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: https://registry.npmjs.org
      - name: Download release tarball
        run: gh release download "${{ github.event.release.tag_name }}" --pattern "*.tgz" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Publish to npm
        run: npm publish *.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
